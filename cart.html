<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOMEDOKAN | Cart</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="pt-5" style="background-color: #e8f5e9;">

        <div id="global-navbar"></div>

        <section class="py-5">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="fw-bold">Shopping Cart</h2>
                    <p class="text-muted">Review your selected products</p>
                </div>

                <div id="cartSection" class="row g-4">
                    <div class="col-12 col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">Cart Items</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Product</th>
                                                <th>Price</th>
                                                <th class="text-center">Quantity</th>
                                                <th>Total</th>
                                                <th class="text-center">Action</th>
                                            </tr>
                                        </thead>

                                        <tbody id="cartItems">
                                            
                                        </tbody>

                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-lg-4">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">
                                    Cart Summary
                                </h5>
                            </div>
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-3">
                                    <span>Items</span>
                                    <strong id="itemCount">0</strong>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span>Subtotal</span>
                                    <strong>₹<span id="grandTotal">0</span></strong>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between fs-5">
                                    <strong>Total</strong>
                                    <strong>
                                        ₹<span id="grandTotal">0</span>
                                    </strong>
                                </div>
                                <button id="placeOrderBtn" class="btn btn-success w-100 mt-4">
                                    Place Order
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5 d-none" id="emptyCart">
                    <h3>Your Cart is Empty</h3>
                    <p class="text-muted">
                        Add products to your cart.
                    </p>
                    <a href="product.html" class="btn btn-success">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            function injectLayout(id, file) {
                fetch(file)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    });
            }
            injectLayout("global-navbar", "navbar.html");
            injectLayout("global-footer", "footer.html");
        </script>

        <script>
            function renderCart() {

                const productprices = {
                    "Organic Tomatoes": 80,
                    "Fresh Spinach": 60,
                    "Carrots": 50,
                    "Arabic Coffee Beans": 450,
                    "Fresh Orange Juice": 150,
                    "Chicken Breast": 380,
                    "Fresh Milk": 60,
                    "Apples": 120,
                    "Organic Dish Soap": 120
                }

                const stored = localStorage.getItem('homedokanCart');
                const cart = stored ? JSON.parse(stored) : {};
                const tbody = document.getElementById('cartItems');
                const emptyCart = document.getElementById('emptyCart');
                const cartSection = document.getElementById('cartSection');
                const itemCount = document.getElementById('itemCount');
                const grandTotalEls = document.querySelectorAll('#grandTotal');

                tbody.innerHTML = '';
                let totalItems = 0;
                let totalPrice = 0;

                Object.entries(cart).forEach(([title, qty]) => {
                    if (!qty) return;
                    const price = Number(productprices[title]);   //(qty === 1 ? 80 : 80); //should change
                    const rowTotal = price * qty;
                    totalItems += qty;
                    totalPrice += rowTotal;

                const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${title}</td>
                        <td>₹${price}</td>
                        <td class="text-center">${qty}</td>
                        <td>₹${rowTotal}</td>
                        <td class="text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash remove-item" viewBox="0 0 16 16">
                            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                        </svg>
                        </td>
                    `;
                    tbody.appendChild(tr);

                    tr.querySelector('.remove-item').addEventListener('click', () => {
                        delete cart[title];
                        localStorage.setItem('homedokanCart', JSON.stringify(cart));
                        renderCart();
                        });
                    });

                const isEmpty = totalItems === 0;
                cartSection.classList.toggle('d-none', isEmpty);
                emptyCart.classList.toggle('d-none', !isEmpty);
                itemCount.textContent = totalItems;
                grandTotalEls.forEach(el => el.textContent = totalPrice);
            }

            renderCart();

            document.getElementById("placeOrderBtn").addEventListener("click", () => {
                const currentUser = localStorage.getItem("currentUser");
                if(currentUser)
                    window.location.href="checkout.html";
                else
                    window.location.href="login.html";
            });

        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
