<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Contact — HOMEDOKAN</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" 
              rel="stylesheet" 
              integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" 
              crossorigin="anonymous">
        <style>
            body { padding-top: 62px; }
        </style>
    </head>
    <body>
        <div id="global-navbar"></div>

        <section class="py-5" style="background-color: #e8f5e9;">
            <div class="container">
                <h3 class="py-2 fw-bold text-warning text-center mb-5">Contact Us</h3>

                <div class="row g-4 g-lg-5 align-items-start">

                    <div class="col-12 col-md-6 col-lg-6">
                        <div class="ratio ratio-16x9 mb-4">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31323.643305155543!2d76.99870650000001!3d11.0793965!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba8f7f3acac202b%3A0xb9a1348889c47108!2sSaravanampatti%2C%20Coimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1781777705166!5m2!1sen!2sin"
                                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>

                        <div class="bg-white p-4 rounded">
                            
                            <p class="mb-2">
                                <strong class="text-success">Address:</strong>
                                <br>
                                <span class="text-dark">6, Vishwapuram, Saravanampatti, Coimbatore, Tamil Nadu</span>
                            </p>

                            <p class="mb-2">
                                <strong class="text-success">Phone:</strong>
                                <br>
                                <a href="tel:+911234567890" class="text-dark text-decoration-none">+91 1234567890</a>
                            </p>

                            <p class="mb-0">
                                <strong class="text-success">Email:</strong>
                                <br>
                                <a href="mailto:homedokan@gmail.com" class="text-dark text-decoration-none">homedokan@gmail.com</a>
                            </p>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-6">
                        <div class="card shadow-lg border-0">
                            <div class="card-body p-4 p-md-5">
                                <h5 class="card-title text-success fw-bold mb-4">Send us a Message</h5>

                                <form id="contactForm">
                                    <div class="mb-3">
                                        <label for="name" class="form-label fw-bold">Full Name</label>
                                        <input required type="text" class="form-control form-control-lg" 
                                               id="name" placeholder="Enter your full name">
                                    </div>

                                    <div class="mb-3">
                                        <label for="email" class="form-label fw-bold">Email Address</label>
                                        <input required type="email" class="form-control form-control-lg" 
                                               id="email" placeholder="Enter your email">
                                    </div>

                                    <div class="mb-3">
                                        <label for="phone" class="form-label fw-bold">Phone</label>
                                        <input type="tel" class="form-control form-control-lg" 
                                               id="phone" placeholder="Enter your phone number">
                                    </div>

                                    <div class="mb-4">
                                        <label for="message" class="form-label fw-bold">Message</label>
                                        <textarea required class="form-control" id="message" rows="5" 
                                                  placeholder="Enter your message here..."></textarea>
                                    </div>

                                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
                                        Send Message
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            function injectLayout(elementId, filePath) {
                fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load ' + filePath);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error(error));
            }
            injectLayout('global-navbar', 'navbar.html');
            injectLayout('global-footer', 'footer.html');
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
                crossorigin="anonymous"></script>

    </body>
</html>
