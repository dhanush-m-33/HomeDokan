<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOMEDOKAN | My Account</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="pt-5" style="background:#e8f5e9;">

        <div id="global-navbar"></div>

        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                        <div class="card shadow">
                            <div class="card-header bg-success text-white text-center">
                                <h3>My Account</h3>
                            </div>
                            <div class="card-body">
                                <div id="accountDetails">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            function injectLayout(elementId, filePath) {
                fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load ' + filePath);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error(error));
            }
            injectLayout('global-navbar', 'navbar.html');
            injectLayout('global-footer', 'footer.html');
        </script>

        <script>
            const user=JSON.parse(localStorage.getItem("currentUser"));
            const account=document.getElementById("accountDetails");
            if(user){
                account.innerHTML=`
                    <h5>Name</h5>
                    <p>${user.name}</p>
                    <h5>Email</h5>
                    <p>${user.email}</p>
                    <button class="btn btn-danger w-100 mt-3" onclick="logout()">
                        Logout
                    </button>
                `;
            }
            else{
                account.innerHTML=`
                    <div class="text-center">
                        <h4>You are not logged in</h4>
                        <p class="text-muted">
                            Please login to continue.
                        </p>
                        <a href="login.html" class="btn btn-success">
                            Login
                        </a>
                    </div>
                `;
            }

            function logout(){
                localStorage.removeItem("currentUser");
                alert("Logged Out Successfully");
                window.location.href="home.html";
            }

        </script>
    </body>
</html>
