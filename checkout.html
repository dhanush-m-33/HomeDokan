<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOMEDOKAN | Checkout</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="pt-5" style="background:#e8f5e9;">

        <div id="global-navbar"></div>

        <section class="py-5">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 class="fw-bold">Checkout</h2>
                    <p class="text-muted">Confirm your order details</p>
                </div>
                <div class="row g-4">
                    <div class="col-12 col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">Customer Details</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="customerName"
                                        readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="customerEmail"
                                        readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Delivery Address</label>
                                    <textarea
                                        class="form-control"
                                        id="address"
                                        rows="4"
                                        placeholder="Enter delivery address"
                                        required></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">Order Summary</h5>
                            </div>
                            <div class="card-body">
                                <div id="orderItems"></div>
                                <hr>
                                <div class="d-flex justify-content-between">
                                    <strong>Total Items</strong>
                                    <strong id="totalItems">0</strong>
                                </div>
                                <div class="d-flex justify-content-between mt-3 fs-5">
                                    <strong>Total</strong>
                                    <strong>₹<span id="totalPrice">0</span></strong>
                                </div>
                                <button id="confirmOrder" class="btn btn-success btn-lg w-100 mt-4">
                                    Place Order
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            function injectLayout(elementId, filePath) {
                fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load ' + filePath);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error(error));
            }
            injectLayout('global-navbar', 'navbar.html');
            injectLayout('global-footer', 'footer.html');
        </script>

        <script>
            const prices = {
                "Organic Tomatoes":80,
                "Fresh Spinach":60,
                "Carrots":50,
                "Arabic Coffee Beans":450,
                "Fresh Orange Juice":150,
                "Chicken Breast":380,
                "Fresh Milk":60,
                "Apples":120,
                "Organic Dish Soap":120
            };

            const currentUser = JSON.parse(localStorage.getItem("currentUser"));

            if(!currentUser){
                window.location.href="login.html";
            }

            document.getElementById("customerName").value=currentUser.name;
            document.getElementById("customerEmail").value=currentUser.email;
            const cart=JSON.parse(localStorage.getItem("homedokanCart"))||{};
            const orderItems=document.getElementById("orderItems");

            let totalItems=0;
            let totalPrice=0;

            Object.entries(cart).forEach(([item,qty])=>{
                const subtotal=prices[item]*qty;
                totalItems+=qty;
                totalPrice+=subtotal;
                orderItems.innerHTML+=`
                <div class="d-flex justify-content-between mb-2">
                    <span>${item} x ${qty}</span>
                    <strong>₹${subtotal}</strong>
                </div>
                `;
            });

            document.getElementById("totalItems").textContent=totalItems;
            document.getElementById("totalPrice").textContent=totalPrice;

            document.getElementById("confirmOrder").addEventListener("click",()=>{
                const address=document.getElementById("address").value.trim();
                if(address===""){
                    alert("Please enter delivery address.");
                    return;
                }
                const orders=JSON.parse(localStorage.getItem("homedokanOrders"))||[];
                orders.push({
                    customer:currentUser,
                    cart,
                    address,
                    totalItems,
                    totalPrice,
                    orderDate:new Date().toLocaleString()
                });

                localStorage.setItem("homedokanOrders",JSON.stringify(orders));
                localStorage.removeItem("homedokanCart");
                alert("Order Placed Successfully!");
                window.location.href="index.html";
            });
        </script>
    </body>
</html>
