<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOMEDOKAN | Login</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="pt-5" style="background-color: #e8f5e9;">

        <div id="global-navbar"></div>

        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                        <div class="card shadow border-0">
                            <div class="card-header bg-success text-white text-center py-3">
                                <h3 class="mb-0 fw-bold">Login</h3>
                            </div>
                            <div class="card-body p-4">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label">Email Address</label>
                                        <input
                                            type="email"
                                            class="form-control"
                                            id="loginEmail"
                                            placeholder="Enter your email"
                                            required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Password</label>
                                        <input
                                            type="password"
                                            class="form-control"
                                            id="loginPassword"
                                            placeholder="Enter password"
                                            required>
                                    </div>
                                    <button class="btn btn-success btn-lg w-100">
                                        Login
                                    </button>
                                </form>
                                <hr>
                                <p class="text-center mb-0">
                                    Don't have an account?
                                    <a href="signup.html" class="text-success text-decoration-none fw-semibold">
                                        Create Account
                                    </a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            function injectLayout(elementId, filePath) {
                fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load ' + filePath);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error(error));
            }
            injectLayout('global-navbar', 'navbar.html');
            injectLayout('global-footer', 'footer.html');
        </script>

        <script>
            document.getElementById("loginForm").addEventListener("submit", function (e) {
                e.preventDefault();

                const email = document.getElementById("loginEmail").value.trim();
                const password = document.getElementById("loginPassword").value;

                const users = JSON.parse(localStorage.getItem("homedokanUsers")) || [];

                const user = users.find(u =>
                    u.email === email &&
                    u.password === password
                );

                if (user) {
                    localStorage.setItem("currentUser", JSON.stringify({
                        name: user.name,
                        email: user.email
                    }));
                    alert("Login Successful!");
                    window.location.href = "checkout.html";
                } else {
                    alert("Invalid Email or Password");
                }
            });
        </script>
    </body>
</html>
