<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HOMEDOKAN Products</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous">
        <style>
            body { 
                padding-top: 60px; 
            }
            .highlight-card .card{
                background-color:#b7ffaf;
                border:2px solid #127c06;
                transform:scale(1.03);
                transition:all .5s ease;
            }
            .card{
                transition:all .5s ease;
            }
        </style>
    </head>
    <body>

        <div id="global-navbar"></div>

        <section class="py-5" style="background-color: #e8f5e9;">
            <div class="container mt-4">

                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-4">
                    <div class="mb-3 mb-lg-0">
                        <p class="text-warning mb-1 fw-bold">Shop</p>
                        <h1 class="fw-bold">All Products</h1>
                    </div>
                    <div class="w-lg-50">
                        <div class="input-group">
                            <input type="text" class="form-control" id="searchInput" list="productList" placeholder="Search products...">
                            <datalist id="productList">
                                <option value="Organic Tomatoes">
                                <option value="Fresh Spinach">
                                <option value="Carrots">
                                <option value="Arabica Coffee Beans">
                                <option value="Fresh Orange Juice">
                                <option value="Chicken Breast">
                                <option value="Fresh Milk">
                                <option value="Apples">
                                <option value="Organic Dish Soap">
                            </datalist>
                            <button class="btn btn-success" onclick="searchProduct()">Search</button>
                        </div>
                    </div>
                </div>
        
                <!-- <div class="d-sm-flex justify-content-between align-items-center mb-4">
                    <div>
                        <p class="text-warning mb-1 fw-bold">Shop</p>
                        <h1 class="fw-bold">All Products</h1>
                    </div>
                </div> -->

                <div class="row g-3 mb-5">
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">🥦</div>
                            <h6 class="mt-3">Vegetables</h6>
                            <small class="text-muted">5 products</small>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">☕</div>
                            <h6 class="mt-3">Coffee & Drinks</h6>
                            <small class="text-muted">4 products</small>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">🍖</div>
                            <h6 class="mt-3">Meat</h6>
                            <small class="text-muted">4 products</small>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">🥛</div>
                            <h6 class="mt-3">Milk & Dairy</h6>
                            <small class="text-muted">4 products</small>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">🍎</div>
                            <h6 class="mt-3">Fresh Fruits</h6>
                            <small class="text-muted">5 products</small>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                        <div class="card border-0 shadow-sm text-center p-3 h-100">
                            <div class="fs-1">🧴</div>
                            <h6 class="mt-3">Cleaning</h6>
                            <small class="text-muted">4 products</small>
                        </div>
                    </div>
                </div>


                <div class="row g-4" id="productsContainer"> <!--new-->

                </div>


            </div>
        </section>

        <div id="global-footer"></div>

        <script>
            const products = [
                {
                    id:1,
                    category:"Vegetables",
                    name:"Organic Tomatoes",
                    price:80,
                    unit:"kg",
                    description:"Fresh farm tomatoes, rich in flavor and nutrition.",
                    stock:"In Stock"
                },

                {
                    id:2,
                    category:"Vegetables",
                    name:"Fresh Spinach",
                    price:60,
                    unit:"bunch",
                    description:"Tender and green, perfect for salads and cooking.",
                    stock:"In Stock"
                },

                {
                    id:3,
                    category:"Vegetables",
                    name:"Carrots",
                    price:50,
                    unit:"kg",
                    description:"Crunchy and sweet, ideal for snacks and soups.",
                    stock:"Low Stock"
                },

                {
                    id:4,
                    category:"Coffe & Drinks",
                    name:"Arabic Coffee Beans",
                    price:450,
                    unit:"kg",
                    description:"Smooth and aromatic premium coffee",
                    stock:"In Stock"
                },

                {
                    id:5,
                    category:"Coffe & Drinks",
                    name:"Fresh Orange Juice",
                    price:150,
                    unit:"L",
                    description:"Cold-pressed orange juice with natural sweetness.",
                    stock:"In Stock"
                },

                {
                    id:6,
                    category:"Meat",
                    name:"Chicken Breast",
                    price:380,
                    unit:"kg",
                    description:"Lean and juicy chicken breast, perfect for grilled meals.",
                    stock:"In Stock"
                },
                
                {
                    id:7,
                    category:"Milk & Dairy",
                    name:"Fresh Milk",
                    price:60,
                    unit:"L",
                    description:"Pure farm milk for daily use.",
                    stock:"In Stock"
                },
                
                {
                    id:8,
                    category:"Fresh Fruits",
                    name:"Apples",
                    price:120,
                    unit:"kg",
                    description:"Crisp and juicy apples from top orchards.",
                    stock:"In Stock"
                },

                {
                    id:9,
                    category:"Cleaning",
                    name:"Organic Dish Soap",
                    price:120,
                    unit:"500ml",
                    description:"Gentle, effective cleaner for kitchen use.",
                    stock:"In Stock"
                }

            ];

            const container=document.getElementById("productsContainer");
            products.forEach(product=>{
                container.innerHTML+=`
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3" id="${product.id}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <p class="text-warning mb-1">${product.category}</p>
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text text-success fw-bold">
                                    ₹${product.price} / ${product.unit}
                                </p>
                                <p class="text-muted">
                                    ${product.description}
                                </p>
                            </div>
                            <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
                                <button class="btn btn-success btn-sm add-to-cart-btn py-2 w-100 px-0">
                                    Add to Cart
                                </button>
                                <small class="text-muted px-2">
                                    ${product.stock}
                                </small>
                            </div>
                        </div>
                    </div>
                `;
            });
        </script>

        <script>
            function injectLayout(elementId, filePath) {
            fetch(filePath)
                .then(response => {
                if (!response.ok) throw new Error('Failed to load ' + filePath);
                return response.text();
                })
                .then(data => {
                document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error(error));
            }
            injectLayout('global-navbar', 'navbar.html');
            injectLayout('global-footer', 'footer.html');
        </script>

        <script>
            const cart = JSON.parse(localStorage.getItem("homedokanCart")) || {};

            function updateButton(button, qty) {

                if (qty <= 0) {
                    button.className = "btn btn-success btn-sm add-to-cart-btn py-2 w-100 px-0";
                    button.textContent = "Add to Cart";
                    return;
                }

                button.className = "btn btn-success btn-sm add-to-cart-btn py-2 w-100 px-0";
                button.innerHTML = `
                    <div class="d-flex align-items-center justify-content-center w-100">
                        <button type="button" class="btn btn-sm btn-light qty-btn py-0" data-action="decrease">-</button>
                        <span class="px-2 qty-value">${qty}</span>
                        <button type="button" class="btn btn-sm btn-light qty-btn py-0" data-action="increase">+</button>
                        <span class="invisible">Add to Cart</span>
                    </div>
                `;
            }

            function updateCartIcon() {
                const badge = document.getElementById("cartIcon");
                if (!badge) return;
                let total = 0;
                Object.values(cart).forEach(qty => total += qty);
                if (total > 0) {
                    badge.textContent = total;
                    badge.classList.remove("d-none");
                } else {
                    badge.classList.add("d-none");
                }
            }

            function saveCart() {
                localStorage.setItem("homedokanCart", JSON.stringify(cart));
            }

            function getCardInfo(button) {
                const card = button.closest(".card");
                return {
                    title: card.querySelector(".card-title").textContent
                };
            }

            function handleAddClick(button) {                                     // first time click
                const { title } = getCardInfo(button);
                cart[title] = (cart[title] || 0) + 1;
                updateButton(button, cart[title]);
                saveCart();
                updateCartIcon();
            }

            function handleQtyClick(button, action) {                             // qty change
                const card = button.closest(".card");
                const addBtn = card.querySelector(".add-to-cart-btn");
                const { title } = getCardInfo(addBtn);
                let qty = cart[title] || 0;

                if (action === "increase")
                    qty++;
                else
                    qty--;
                if (qty <= 0) {
                    delete cart[title];
                    qty = 0;
                } else {
                    cart[title] = qty;
                }
                updateButton(addBtn, qty);
                saveCart();
                updateCartIcon();
            }
            
            document.querySelectorAll(".add-to-cart-btn").forEach(button => {      // Restore cart after products are created
                const { title } = getCardInfo(button);
                const qty = cart[title] || 0;
                if (qty > 0)
                    updateButton(button, qty);
            });

            document.addEventListener("click", function (event) {
                if (event.target.classList.contains("add-to-cart-btn")) {          // add-to-cart btn
                    if (event.target.querySelector(".qty-btn"))
                        return;
                    
                    handleAddClick(event.target);
                }
                const qtyBtn = event.target.closest(".qty-btn");                   // qty btn
                if (qtyBtn) {
                    handleQtyClick(qtyBtn, qtyBtn.dataset.action);
                }
            });
            updateCartIcon();
            function searchProduct() {
                const search = document.getElementById("searchInput").value.trim().toLowerCase();
                const product = products.find(p => p.name.toLowerCase().includes(search));
                if (!product) {
                    alert("Product not found!");
                    return;
                }
                
                const productCard = document.getElementById(product.id);           // scroll to item
                productCard.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
                setTimeout(() => {
                    productCard.classList.add("highlight-card");
                    setTimeout(() => {
                        productCard.classList.remove("highlight-card");
                    }, 500);
                }, 400);
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous">
        </script>

    </body>
</html>
